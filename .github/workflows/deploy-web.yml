name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "scripts/web-cloudflare.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate deploy configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NOVAMIND_ACCESS_EMAIL_DOMAIN: ${{ vars.NOVAMIND_ACCESS_EMAIL_DOMAIN }}
          CLOUDFLARE_ACCESS_AUD: ${{ vars.CLOUDFLARE_ACCESS_AUD }}
          CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
          NOVAMIND_AGENT_INTERNAL_TOKEN: ${{ secrets.NOVAMIND_AGENT_INTERNAL_TOKEN }}
        run: |
          missing=0
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            NOVAMIND_ACCESS_EMAIL_DOMAIN \
            CLOUDFLARE_ACCESS_AUD \
            CLOUDFLARE_ACCESS_TEAM_DOMAIN \
            NOVAMIND_AGENT_INTERNAL_TOKEN
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Required deploy value $name is empty"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build and deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_NOVAMIND_ACCESS_EMAIL_DOMAIN: ${{ vars.NOVAMIND_ACCESS_EMAIL_DOMAIN }}
          CLOUDFLARE_ACCESS_AUD: ${{ vars.CLOUDFLARE_ACCESS_AUD }}
          CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
        run: pnpm --filter @novamind/web deploy:cf:ci

      - name: Upload web runtime vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NOVAMIND_ACCESS_EMAIL_DOMAIN: ${{ vars.NOVAMIND_ACCESS_EMAIL_DOMAIN }}
          CLOUDFLARE_ACCESS_AUD: ${{ vars.CLOUDFLARE_ACCESS_AUD }}
          CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
          NOVAMIND_AGENT_INTERNAL_TOKEN: ${{ secrets.NOVAMIND_AGENT_INTERNAL_TOKEN }}
        run: |
          put_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Required deploy value $name is empty"
              return 1
            fi
            printf '%s' "$value" | pnpm exec wrangler secret put "$name" --config apps/web/wrangler.toml
          }

          for name in \
            NOVAMIND_ACCESS_EMAIL_DOMAIN \
            CLOUDFLARE_ACCESS_AUD \
            CLOUDFLARE_ACCESS_TEAM_DOMAIN \
            NOVAMIND_AGENT_INTERNAL_TOKEN
          do
            put_secret "$name"
          done
